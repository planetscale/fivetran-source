name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Tests
            service: ci
            command: make test-ci
          - name: Build server
            service: ci
            command: make build-server
          - name: go vet
            service: ci
            command: make vet
          - name: Lint Format
            service: ci
            command: make lint-fmt
          - name: staticcheck
            service: ci
            command: make lint
          - name: Verify dependency licenses
            service: licensing
            command: make license-check

    env:
      DOCKER_BUILDKIT: "1"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Run ${{ matrix.name }}
        run: |
          docker compose run --rm --build "${{ matrix.service }}" sh -c '
            git config --global --add safe.directory "$PWD"

            ${{ matrix.command }}
          '
